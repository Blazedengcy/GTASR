          dropout: 0.13
          sigma_data: 0.5
          sigma_min: 0
          cond_lq: True
          swin: True
          scale: 4
          use_enc: True
          upsampler: 'nearest'
          swin_params:
            embed_dim: 192
            use_conv: True
            num_heads: 6
            window_size: 8
            depth: 1
            patch_size: 1
            mlp_ratio: 4
            qkv_bias: True
            qk_scale: ~
            drop: 0
            attn_drop: 0.
            drop_path: 0.
            use_checkpoint: False
            patch_norm: False
    # validation settings
    val:
      val_freq: 500
      save_img: False
      chop_size: 512
      chop_stride: 448
      min_size: 64

      metrics:
        psnr: # metric name, can be arbitrary
          type: calculate_psnr
          crop_border: 0
          test_y_channel: yes
        
        ssim: # metric name, can be arbitrary
          type: calculate_ssim
          crop_border: 0
          test_y_channel: yes

        lpips:
          type: calculate_lpips
          better: lower
          
        clipiqa:
          type: calculate_clipiqa
          better: higher
        
        musiq:
          type: calculate_musiq
          better: higher
        
        maniqa:
          type: calculate_maniqa
          better: higher
        
        niqe:
          type: calculate_niqe
          better: lower

        

    # logging settings
    logger:
      print_freq: 100
      save_checkpoint_freq: !!float 500
      use_tb_logger: false
      wandb:
        project: ~
        resume_id: ~

    # dist training settings
    dist_params:
      backend: nccl
      port: 29500
