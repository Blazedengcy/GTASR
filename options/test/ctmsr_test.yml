# network structures
network_g:
  type: EDMUNet
  img_resolution: 64
  img_channels: 3
  label_dim: 0
  augment_dim: 0
  model_channels: 192
  use_fp16: False
  model_type: 'SongUNet'
  embedding_type: 'positional'
  fourier_scale: 8
  encoder_type: 'standard'
  decoder_type: 'standard'
  channel_mult_noise: 1
  channel_mult_emb: 4
  resample_filter: [1, 1,]
  channel_mult: [1, 2, 2, 2,]
  attn_resolutions: [64, 32, 16, 8]
  dropout: 0.13
  sigma_data: 0.5
  sigma_min: 0
  cond_lq: True
  swin: True
  scale: 4
  use_enc: True
  upsampler: 'nearest'
  res_con: False
  swin_params:
    embed_dim: 192
    use_conv: True
    num_heads: 6
    window_size: 8
    depth: 1
    patch_size: 1
    mlp_ratio: 4
    qkv_bias: True
    qk_scale: ~
    drop: 0
    attn_drop: 0.
    drop_path: 0.
    use_checkpoint: False
    patch_norm: False


# path
path:
  pretrain_network_g: GTASR_final_phase.pth
  strict_load_g: true
  param_key_g: params_ema
# training settings
train:
  consistency_opt:
    sigma_min: 0
    sigma_max: 1




# validation settings
val:
  suffix: ~
  save_img: true
  chop_size: 512
  chop_stride: 448
  min_size: 64

  metrics:
